<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEMADOS — Admin</title>
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --surface2: #1e1e1e;
    --border:   #2a2a2a;
    --accent:   #e8003d;
    --accent2:  #ff4d6d;
    --text:     #e8e8e8;
    --muted:    #666;
    --green:    #22c55e;
    --yellow:   #f59e0b;
    --blue:     #3b82f6;
    --tag-bg:   #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }
  #login-screen h1 { font-size: 22px; letter-spacing: 4px; color: var(--accent); }
  #login-screen p { color: var(--muted); font-size: 11px; letter-spacing: 2px; }
  #key-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 16px;
    width: 280px;
    outline: none;
    letter-spacing: 2px;
  }
  #key-input:focus { border-color: var(--accent); }
  #login-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 32px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    width: 280px;
  }
  #login-btn:hover { background: var(--accent2); }
  #login-error { color: var(--accent); font-size: 11px; display: none; }

  /* ── SHELL ── */
  #app { display: none; }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent);
    flex: 1;
  }
  header span { color: var(--muted); font-size: 11px; }
  #logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STATS BAR ── */
  #stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-block {
    flex: 1;
    background: var(--surface);
    padding: 14px 20px;
    text-align: center;
  }
  .stat-block .num {
    font-size: 28px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
  }
  .stat-block .lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ── TABS ── */
  #tabs {
    display: flex;
    gap: 1px;
    background: var(--border);
    padding: 0;
  }
  .tab {
    flex: 1;
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px;
    cursor: pointer;
    text-align: center;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface2); }

  /* ── MAIN LAYOUT ── */
  #main {
    display: flex;
    height: calc(100vh - 112px);
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-section {
    padding: 6px 16px 4px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    transition: all 0.1s;
    border-left: 2px solid transparent;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
  .sidebar-item .count {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 0;
  }
  .sidebar-item.active .count { border-color: var(--accent); color: var(--accent); }

  /* ── CONTENT PANE ── */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    background: var(--bg);
  }

  /* ── TOOLBAR ── */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 6px 12px;
    flex: 1;
    outline: none;
  }
  #search-input:focus { border-color: var(--accent); }
  #result-count { color: var(--muted); font-size: 11px; white-space: nowrap; }
  #refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
  }
  #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── POST CARDS ── */
  .post-card {
    border-bottom: 1px solid var(--border);
    padding: 16px;
    transition: background 0.1s;
  }
  .post-card:hover { background: var(--surface); }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .post-id { color: var(--muted); font-size: 11px; }
  .post-cat {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    padding: 1px 7px;
    letter-spacing: 1px;
  }
  .post-author { color: var(--yellow); font-size: 11px; }
  .post-date { color: var(--muted); font-size: 11px; margin-left: auto; }
  .post-likes { color: var(--muted); font-size: 11px; }
  .likes-num { color: var(--accent2); }

  .post-target {
    font-size: 14px;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 4px;
  }
  .post-content {
    color: #aaa;
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 10px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .post-images {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .post-images img {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .post-images img:hover { border-color: var(--accent); }

  /* ── DEVICE INFO ── */
  .device-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .d-tag {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .d-tag .d-key { color: var(--accent); }
  .d-tag.mobile { border-color: #3b82f6; }
  .d-tag.mobile .d-key { color: var(--blue); }
  .d-tag.desktop { border-color: #22c55e; }
  .d-tag.desktop .d-key { color: var(--green); }
  .d-tag.unknown { opacity: 0.5; }

  .delete-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 1px;
    float: right;
    margin-top: -2px;
  }
  .delete-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── USER CARDS (vista usuarios) ── */
  .user-card {
    border: 1px solid var(--border);
    margin: 12px 16px;
    background: var(--surface);
  }
  .user-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .user-header:hover { background: var(--surface2); }
  .user-avatar {
    width: 36px;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .user-info { flex: 1; }
  .user-id { font-size: 11px; color: var(--accent); letter-spacing: 1px; }
  .user-summary { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .user-device-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .user-posts-count {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    text-align: right;
    line-height: 1;
  }
  .user-posts-label { font-size: 9px; color: var(--muted); text-align: right; }
  .user-posts-list { display: none; }
  .user-posts-list.open { display: block; }
  .user-posts-list .post-card { background: var(--bg); }
  .user-posts-list .post-card:hover { background: var(--surface2); }
  .chevron { color: var(--muted); transition: transform 0.2s; font-size: 14px; }
  .chevron.open { transform: rotate(90deg); }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── IMAGE LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border: 1px solid var(--border); }
  #lightbox-close {
    position: absolute;
    top: 16px; right: 20px;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }

  /* ── CONFIRM MODAL ── */
  #confirm-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 998;
    align-items: center;
    justify-content: center;
  }
  #confirm-modal.open { display: flex; }
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    max-width: 340px;
    width: 90%;
  }
  .confirm-box p { font-size: 13px; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-actions button {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
  }
  .confirm-actions button:hover { color: var(--text); }
  #confirm-yes { background: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>QUEMADOS</h1>
  <p>PANEL DE ADMINISTRACIÓN</p>
  <input id="key-input" type="password" placeholder="ADMIN KEY" autocomplete="off">
  <button id="login-btn">ENTRAR</button>
  <span id="login-error">Clave incorrecta o error de conexión</span>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>🔥 QUEMADOS — ADMIN</h1>
    <span id="header-info"></span>
    <button id="logout-btn">SALIR</button>
  </header>

  <div id="stats-bar">
    <div class="stat-block"><div class="num" id="s-posts">—</div><div class="lbl">POSTS</div></div>
    <div class="stat-block"><div class="num" id="s-likes">—</div><div class="lbl">LIKES</div></div>
    <div class="stat-block"><div class="num" id="s-comments">—</div><div class="lbl">COMENTARIOS</div></div>
    <div class="stat-block"><div class="num" id="s-users">—</div><div class="lbl">USUARIOS ID</div></div>
  </div>

  <div id="tabs">
    <button class="tab active" data-tab="categories">POR CATEGORÍA</button>
    <button class="tab" data-tab="users">POR USUARIO</button>
    <button class="tab" data-tab="all">TODOS LOS POSTS</button>
  </div>

  <div id="main">
    <div id="sidebar"></div>
    <div id="content">
      <div id="toolbar">
        <input id="search-input" type="text" placeholder="Buscar en posts...">
        <span id="result-count"></span>
        <button id="refresh-btn">↺ RELOAD</button>
      </div>
      <div id="posts-list"></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- CONFIRM -->
<div id="confirm-modal">
  <div class="confirm-box">
    <p id="confirm-text">¿Eliminar este post? Esta acción no se puede deshacer.</p>
    <div class="confirm-actions">
      <button id="confirm-no">CANCELAR</button>
      <button id="confirm-yes">ELIMINAR</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let ADMIN_KEY = '';
let allPosts  = [];
let stats     = null;
let activeTab = 'categories';
let activeCat = '__all__';
let searchQ   = '';
let pendingDeleteId = null;

const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3000'
  : 'https://server-upload-production.up.railway.app';

// ── LOGIN ──
document.getElementById('login-btn').onclick = tryLogin;
document.getElementById('key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

async function tryLogin() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) return;
  try {
    const r = await fetch(`${API}/admin/stats`, {
      headers: { 'x-admin-key': key }
    });
    if (!r.ok) throw new Error('unauth');
    ADMIN_KEY = key;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } catch {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('logout-btn').onclick = () => {
  ADMIN_KEY = '';
  allPosts  = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('key-input').value = '';
};

// ── TABS ──
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    activeCat = '__all__';
    searchQ   = '';
    document.getElementById('search-input').value = '';
    renderSidebar();
    renderContent();
  };
});

// ── SEARCH ──
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  renderContent();
});

// ── REFRESH ──
document.getElementById('refresh-btn').onclick = loadAll;

// ── LOAD DATA ──
async function loadAll() {
  showLoading();
  try {
    const [statsRes, postsRes] = await Promise.all([
      fetch(`${API}/admin/stats`, { headers: { 'x-admin-key': ADMIN_KEY } }),
      fetch(`${API}/admin/posts?limit=500`, { headers: { 'x-admin-key': ADMIN_KEY } }),
    ]);
    stats    = await statsRes.json();
    const pd = await postsRes.json();
    allPosts = pd.posts || [];
    renderStats();
    renderSidebar();
    renderContent();
  } catch(e) {
    document.getElementById('posts-list').innerHTML =
      `<div class="empty-state">ERROR CARGANDO DATOS</div>`;
  }
}

function showLoading() {
  document.getElementById('posts-list').innerHTML = '<div class="spinner"></div>';
}

// ── STATS ──
function renderStats() {
  document.getElementById('s-posts').textContent    = stats.total_posts;
  document.getElementById('s-likes').textContent    = stats.total_likes;
  document.getElementById('s-comments').textContent = stats.total_comments;
  // contar usuarios únicos por fingerprint
  const uniqueUsers = new Set(allPosts.map(p => userFingerprint(p))).size;
  document.getElementById('s-users').textContent = uniqueUsers;
}

// ── SIDEBAR ──
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  if (activeTab === 'categories') {
    // build category list from allPosts
    const catMap = {};
    allPosts.forEach(p => {
      const c = p.category || 'Sin categoría';
      catMap[c] = (catMap[c] || 0) + 1;
    });
    const cats = Object.entries(catMap).sort((a,b) => b[1]-a[1]);

    sb.innerHTML = `<div class="sidebar-section">CATEGORÍAS</div>`;
    const allItem = document.createElement('div');
    allItem.className = 'sidebar-item' + (activeCat === '__all__' ? ' active' : '');
    allItem.innerHTML = `<span>Todas</span><span class="count">${allPosts.length}</span>`;
    allItem.onclick = () => { activeCat = '__all__'; renderSidebar(); renderContent(); };
    sb.appendChild(allItem);

    cats.forEach(([cat, cnt]) => {
      const el = document.createElement('div');
      el.className = 'sidebar-item' + (activeCat === cat ? ' active' : '');
      el.innerHTML = `<span>${cat}</span><span class="count">${cnt}</span>`;
      el.onclick = () => { activeCat = cat; renderSidebar(); renderContent(); };
      sb.appendChild(el);
    });

  } else if (activeTab === 'users') {
    // group by fingerprint
    const userMap = buildUserMap();
    const users   = Object.entries(userMap).sort((a,b) => b[1].posts.length - a[1].posts.length);

    sb.innerHTML = `<div class="sidebar-section">USUARIOS (${users.length})</div>`;
    const allItem = document.createElement('div');
    allItem.className = 'sidebar-item' + (activeCat === '__all__' ? ' active' : '');
    allItem.innerHTML = `<span>Todos</span><span class="count">${users.length}</span>`;
    allItem.onclick = () => { activeCat = '__all__'; renderSidebar(); renderContent(); };
    sb.appendChild(allItem);

    users.forEach(([fp, data]) => {
      const el = document.createElement('div');
      el.className = 'sidebar-item' + (activeCat === fp ? ' active' : '');
      const label = data.label.slice(0, 18) + (data.label.length > 18 ? '…' : '');
      el.innerHTML = `<span>${label}</span><span class="count">${data.posts.length}</span>`;
      el.onclick = () => { activeCat = fp; renderSidebar(); renderContent(); };
      sb.appendChild(el);
    });

  } else {
    sb.innerHTML = `<div class="sidebar-section">FILTROS</div>`;
    const allItem = document.createElement('div');
    allItem.className = 'sidebar-item active';
    allItem.innerHTML = `<span>Todos</span><span class="count">${allPosts.length}</span>`;
    sb.appendChild(allItem);
  }
}

// ── FINGERPRINT / USER GROUPING ──
function userFingerprint(post) {
  if (!post.device_info) return 'unknown_' + (post.author || 'anonimo');
  const d = post.device_info;
  // Use a combination of resolution + platform + userAgent prefix as fingerprint
  const res    = d.screen  || '';
  const plat   = d.platform || d.os || '';
  const ua     = (d.ua || '').slice(0, 60);
  const lang   = d.lang || '';
  return btoa(unescape(encodeURIComponent(res + '|' + plat + '|' + ua + '|' + lang))).slice(0, 24);
}

function buildUserMap() {
  const map = {};
  allPosts.forEach(p => {
    const fp = userFingerprint(p);
    if (!map[fp]) {
      map[fp] = {
        posts: [],
        label: labelForPost(p),
        device: p.device_info || null,
      };
    }
    map[fp].posts.push(p);
  });
  return map;
}

function labelForPost(p) {
  if (!p.device_info) return p.author || 'Anónimo';
  const d = p.device_info;
  if (d.mobile) return `📱 ${d.os || d.platform || 'Móvil'}`;
  return `🖥 ${d.os || d.platform || 'PC'}`;
}

// ── CONTENT ──
function renderContent() {
  if (activeTab === 'users') {
    renderUsers();
  } else {
    renderPosts();
  }
}

function filteredPosts() {
  let posts = allPosts;

  if (activeTab === 'categories' && activeCat !== '__all__') {
    posts = posts.filter(p => (p.category || 'Sin categoría') === activeCat);
  }
  if (searchQ) {
    posts = posts.filter(p =>
      (p.target   || '').toLowerCase().includes(searchQ) ||
      (p.content  || '').toLowerCase().includes(searchQ) ||
      (p.author   || '').toLowerCase().includes(searchQ) ||
      (p.category || '').toLowerCase().includes(searchQ)
    );
  }
  return posts;
}

function renderPosts() {
  const posts = filteredPosts();
  document.getElementById('result-count').textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;
  const container = document.getElementById('posts-list');
  if (!posts.length) {
    container.innerHTML = '<div class="empty-state">SIN RESULTADOS</div>';
    return;
  }
  container.innerHTML = posts.map(p => postCardHTML(p)).join('');
  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.onclick = () => confirmDelete(parseInt(btn.dataset.id));
  });
  container.querySelectorAll('.post-images img').forEach(img => {
    img.onclick = () => openLightbox(img.src);
  });
}

function renderUsers() {
  const userMap = buildUserMap();
  let users = Object.entries(userMap).sort((a,b) => b[1].posts.length - a[1].posts.length);

  if (activeCat !== '__all__') {
    users = users.filter(([fp]) => fp === activeCat);
  }
  if (searchQ) {
    users = users.filter(([, data]) =>
      data.posts.some(p =>
        (p.target  || '').toLowerCase().includes(searchQ) ||
        (p.content || '').toLowerCase().includes(searchQ) ||
        (p.author  || '').toLowerCase().includes(searchQ)
      )
    );
  }

  document.getElementById('result-count').textContent = `${users.length} usuario${users.length !== 1 ? 's' : ''}`;
  const container = document.getElementById('posts-list');
  if (!users.length) {
    container.innerHTML = '<div class="empty-state">SIN USUARIOS</div>';
    return;
  }

  container.innerHTML = users.map(([fp, data]) => userCardHTML(fp, data)).join('');

  // toggle posts list
  container.querySelectorAll('.user-header').forEach(hdr => {
    hdr.onclick = () => {
      const list = hdr.nextElementSibling;
      const chev = hdr.querySelector('.chevron');
      list.classList.toggle('open');
      chev.classList.toggle('open');
    };
  });
  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); confirmDelete(parseInt(btn.dataset.id)); };
  });
  container.querySelectorAll('.post-images img').forEach(img => {
    img.onclick = e => { e.stopPropagation(); openLightbox(img.src); };
  });
}

// ── HTML BUILDERS ──
function deviceTagsHTML(d) {
  if (!d) return `<span class="d-tag unknown"><span class="d-key">DEVICE</span> sin datos</span>`;
  const tags = [];

  if (d.mobile !== undefined) {
    const cls = d.mobile ? 'mobile' : 'desktop';
    const ico = d.mobile ? '📱' : '🖥';
    tags.push(`<span class="d-tag ${cls}"><span class="d-key">TIPO</span> ${ico} ${d.mobile ? 'MÓVIL' : 'PC'}</span>`);
  }
  if (d.os)       tags.push(`<span class="d-tag"><span class="d-key">OS</span> ${esc(d.os)}</span>`);
  if (d.browser)  tags.push(`<span class="d-tag"><span class="d-key">BROWSER</span> ${esc(d.browser)}</span>`);
  if (d.screen)   tags.push(`<span class="d-tag"><span class="d-key">PANTALLA</span> ${esc(d.screen)}</span>`);
  if (d.lang)     tags.push(`<span class="d-tag"><span class="d-key">IDIOMA</span> ${esc(d.lang)}</span>`);
  if (d.tz)       tags.push(`<span class="d-tag"><span class="d-key">TZ</span> ${esc(d.tz)}</span>`);
  if (d.cores)    tags.push(`<span class="d-tag"><span class="d-key">CPU</span> ${esc(d.cores)} núcleos</span>`);
  if (d.ram)      tags.push(`<span class="d-tag"><span class="d-key">RAM</span> ~${esc(String(d.ram))} GB</span>`);
  if (d.touch !== undefined) tags.push(`<span class="d-tag"><span class="d-key">TOUCH</span> ${d.touch ? 'sí' : 'no'}</span>`);
  if (d.dpr)      tags.push(`<span class="d-tag"><span class="d-key">DPR</span> ${esc(String(d.dpr))}x</span>`);

  return tags.join('');
}

function postCardHTML(p) {
  const cat     = p.category || 'Sin categoría';
  const date    = new Date(p.created_at).toLocaleString('es-DO', { dateStyle:'short', timeStyle:'short' });
  const imgs    = p.image_urls?.length
    ? `<div class="post-images">${p.image_urls.map(u => `<img src="${esc(u)}" loading="lazy">`).join('')}</div>`
    : '';
  const device  = deviceTagsHTML(p.device_info);

  return `
  <div class="post-card" data-id="${p.id}">
    <div class="post-meta">
      <span class="post-id">#${p.id}</span>
      <span class="post-cat">${esc(cat)}</span>
      <span class="post-author">${esc(p.author || 'Anónimo')}</span>
      <span class="post-likes">❤ <span class="likes-num">${p.likes}</span></span>
      <span class="post-date">${date}</span>
      <button class="delete-btn" data-id="${p.id}">✕ BORRAR</button>
    </div>
    <div class="post-target">${esc(p.target)}</div>
    <div class="post-content">${esc(p.content)}</div>
    ${imgs}
    <div class="device-strip">${device}</div>
  </div>`;
}

function userCardHTML(fp, data) {
  const posts     = data.posts;
  const d         = data.device;
  const deviceTags= deviceTagsHTML(d);
  const lastPost  = new Date(posts[0].created_at).toLocaleDateString('es-DO');
  const totalLikes= posts.reduce((s, p) => s + (p.likes || 0), 0);
  const ico       = d?.mobile ? '📱' : d ? '🖥' : '👤';
  const label     = data.label;

  const postsHTML = posts.map(p => postCardHTML(p)).join('');

  return `
  <div class="user-card">
    <div class="user-header">
      <div class="user-avatar">${ico}</div>
      <div class="user-info">
        <div class="user-id">ID: ${fp}</div>
        <div class="user-summary">${label} · ${posts.length} post${posts.length!==1?'s':''} · ${totalLikes} likes · último: ${lastPost}</div>
        <div class="user-device-tags">${deviceTags}</div>
      </div>
      <div>
        <div class="user-posts-count">${posts.length}</div>
        <div class="user-posts-label">POSTS</div>
      </div>
      <span class="chevron">▶</span>
    </div>
    <div class="user-posts-list">${postsHTML}</div>
  </div>`;
}

// ── LIGHTBOX ──
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').onclick = () =>
  document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').onclick = e => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
};

// ── DELETE ──
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirm-text').textContent =
    `¿Eliminar post #${id}? Esta acción no se puede deshacer.`;
  document.getElementById('confirm-modal').classList.add('open');
}
document.getElementById('confirm-no').onclick = () => {
  document.getElementById('confirm-modal').classList.remove('open');
  pendingDeleteId = null;
};
document.getElementById('confirm-yes').onclick = async () => {
  if (!pendingDeleteId) return;
  document.getElementById('confirm-modal').classList.remove('open');
  try {
    const r = await fetch(`${API}/admin/posts/${pendingDeleteId}`, {
      method: 'DELETE',
      headers: { 'x-admin-key': ADMIN_KEY },
    });
    if (!r.ok) throw new Error('fail');
    allPosts = allPosts.filter(p => p.id !== pendingDeleteId);
    pendingDeleteId = null;
    renderStats();
    renderSidebar();
    renderContent();
  } catch {
    alert('Error al eliminar el post');
  }
};

// ── UTILS ──
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
