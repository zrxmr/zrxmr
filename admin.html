<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEMADOS — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --s1:#101010;
  --s2:#161616;
  --s3:#1c1c1c;
  --s4:#242424;
  --border:#2a2a2a;
  --border2:#333;
  --red:#e8003d;
  --red2:#ff2d55;
  --red3:#ff6680;
  --text:#f0f0f0;
  --t2:#999;
  --t3:#555;
  --green:#00d68f;
  --blue:#4f9eff;
  --amber:#f5a623;
  --purple:#b44fff;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
#ls{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);z-index:999;
  gap:0;
}
.ls-logo{
  font-family:var(--mono);font-size:11px;letter-spacing:6px;
  color:var(--t3);margin-bottom:40px;text-transform:uppercase;
}
.ls-title{
  font-size:42px;font-weight:600;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--red) 0%,var(--red3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.ls-sub{font-size:12px;color:var(--t3);letter-spacing:3px;margin-bottom:48px;text-transform:uppercase;}
.ls-form{display:flex;flex-direction:column;gap:12px;width:320px;}
.ls-input{
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--mono);font-size:13px;
  padding:14px 18px;outline:none;border-radius:8px;
  letter-spacing:2px;transition:border .2s;
}
.ls-input:focus{border-color:var(--red);}
.ls-btn{
  background:var(--red);color:#fff;border:none;
  font-family:var(--font);font-size:13px;font-weight:500;letter-spacing:1px;
  padding:14px;border-radius:8px;cursor:pointer;
  transition:background .15s,transform .1s;
}
.ls-btn:hover{background:var(--red2);}
.ls-btn:active{transform:scale(.98);}
.ls-err{color:var(--red3);font-size:11px;text-align:center;display:none;padding:8px;background:rgba(232,0,61,.08);border-radius:6px;border:1px solid rgba(232,0,61,.2);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;}

/* ── TOPBAR ── */
.topbar{
  height:52px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.tb-logo{
  font-family:var(--mono);font-size:13px;font-weight:500;
  color:var(--red);letter-spacing:2px;
}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.tb-label{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}
.tb-spacer{flex:1;}
.tb-status{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--t2);font-family:var(--mono);
}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tb-out{
  background:none;border:1px solid var(--border2);color:var(--t2);
  font-family:var(--mono);font-size:11px;padding:5px 12px;
  border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:1px;
}
.tb-out:hover{border-color:var(--red);color:var(--red);}

/* ── STATS ── */
.statsbar{
  display:flex;background:var(--s1);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.stat{
  flex:1;padding:16px 20px;position:relative;
  border-right:1px solid var(--border);transition:background .2s;
}
.stat:last-child{border-right:none;}
.stat:hover{background:var(--s2);}
.stat-n{
  font-size:32px;font-weight:600;line-height:1;
  color:var(--text);font-variant-numeric:tabular-nums;
  transition:color .3s;
}
.stat-n.loading{color:var(--t3);}
.stat-l{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.stat-accent{position:absolute;bottom:0;left:0;height:2px;width:0;background:var(--red);transition:width .6s cubic-bezier(.4,0,.2,1);}
.stat:hover .stat-accent{width:100%;}

/* ── TABS ── */
.tabs{
  display:flex;background:var(--s2);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab{
  flex:1;background:none;border:none;color:var(--t3);
  font-family:var(--font);font-size:11px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;padding:12px 16px;
  cursor:pointer;transition:all .2s;position:relative;
}
.tab::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--red);transform:scaleX(0);transition:transform .2s;
}
.tab:hover{color:var(--t2);background:rgba(255,255,255,.02);}
.tab.on{color:var(--text);}
.tab.on::after{transform:scaleX(1);}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sb{
  width:210px;min-width:210px;background:var(--s1);
  border-right:1px solid var(--border);overflow-y:auto;
  display:flex;flex-direction:column;
}
.sb-head{
  padding:12px 14px 8px;font-size:9px;color:var(--t3);
  letter-spacing:2px;text-transform:uppercase;flex-shrink:0;
}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;cursor:pointer;color:var(--t2);
  transition:all .15s;border-left:2px solid transparent;
  font-size:12px;flex-shrink:0;
}
.sb-item:hover{background:var(--s2);color:var(--text);}
.sb-item.on{background:rgba(232,0,61,.06);color:var(--text);border-left-color:var(--red);}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-count{
  font-family:var(--mono);font-size:10px;padding:2px 7px;
  background:var(--s3);border:1px solid var(--border);
  color:var(--t3);border-radius:4px;flex-shrink:0;
}
.sb-item.on .sb-count{border-color:var(--red);color:var(--red);}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── TOOLBAR ── */
.toolbar{
  position:sticky;top:0;z-index:50;
  background:rgba(8,8,8,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.search{
  flex:1;background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:12px;
  padding:8px 14px;outline:none;border-radius:6px;
  transition:border .2s;
}
.search:focus{border-color:var(--border2);}
.rc{font-size:11px;color:var(--t3);white-space:nowrap;font-family:var(--mono);}
.reload{
  background:none;border:1px solid var(--border);color:var(--t2);
  font-family:var(--mono);font-size:10px;padding:7px 12px;
  border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:1px;
  display:flex;align-items:center;gap:6px;
}
.reload:hover{border-color:var(--border2);color:var(--text);}
.reload svg{transition:transform .3s;}
.reload:hover svg{transform:rotate(180deg);}

/* ── POST CARD ── */
.pc{
  border-bottom:1px solid var(--border);padding:16px;
  transition:background .15s;position:relative;
}
.pc:hover{background:var(--s1);}
.pc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.pc-id{font-family:var(--mono);font-size:10px;color:var(--t3);}
.pc-cat{
  font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;
  background:rgba(232,0,61,.12);color:var(--red3);letter-spacing:.5px;
  text-transform:uppercase;
}
.pc-author{font-size:11px;color:var(--amber);font-family:var(--mono);}
.pc-likes{
  display:flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:10px;color:var(--t3);
}
.pc-likes span{color:var(--red2);}
.pc-date{font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:auto;}
.pc-del{
  background:none;border:1px solid transparent;color:var(--t3);
  font-family:var(--mono);font-size:10px;padding:3px 8px;
  border-radius:5px;cursor:pointer;transition:all .15s;flex-shrink:0;
}
.pc-del:hover{border-color:var(--red);color:var(--red);background:rgba(232,0,61,.06);}
.pc-target{
  font-size:15px;font-weight:500;color:var(--text);
  margin-bottom:6px;line-height:1.3;
}
.pc-body{
  font-size:12px;color:var(--t2);line-height:1.6;
  margin-bottom:10px;white-space:pre-wrap;word-break:break-word;
}
.pc-imgs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.pc-imgs img{
  width:68px;height:68px;object-fit:cover;
  border-radius:6px;border:1px solid var(--border);
  cursor:pointer;transition:transform .15s,border-color .15s;
}
.pc-imgs img:hover{transform:scale(1.05);border-color:var(--border2);}

/* ── DEVICE STRIP ── */
.ds{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.dt{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--s3);border:1px solid var(--border);
  padding:3px 9px;border-radius:5px;font-size:10px;color:var(--t2);
  font-family:var(--mono);
}
.dt .dk{color:var(--t3);font-size:9px;text-transform:uppercase;letter-spacing:.5px;}
.dt.mobile{border-color:#1d3a5e;background:rgba(79,158,255,.06);}
.dt.mobile .dk{color:var(--blue);}
.dt.desktop{border-color:#0d3325;background:rgba(0,214,143,.06);}
.dt.desktop .dk{color:var(--green);}
.dt.nodata{opacity:.3;}

/* ── USER CARD ── */
.uc{
  background:var(--s1);border:1px solid var(--border);
  border-radius:10px;margin:12px;overflow:hidden;
  transition:border-color .2s;
}
.uc:hover{border-color:var(--border2);}
.uc-hdr{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.uc-hdr:hover{background:var(--s2);}
.uc-ico{
  width:38px;height:38px;border-radius:8px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.uc-info{flex:1;min-width:0;}
.uc-id{font-family:var(--mono);font-size:10px;color:var(--t3);}
.uc-summary{font-size:11px;color:var(--t2);margin-top:2px;}
.uc-dtags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.uc-right{text-align:right;flex-shrink:0;}
.uc-count{font-size:28px;font-weight:600;color:var(--red);line-height:1;font-variant-numeric:tabular-nums;}
.uc-clabel{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;}
.uc-chev{
  color:var(--t3);font-size:12px;transition:transform .2s;flex-shrink:0;
  display:flex;align-items:center;
}
.uc-chev.open{transform:rotate(90deg);}
.uc-posts{display:none;border-top:1px solid var(--border);}
.uc-posts.open{display:block;}
.uc-posts .pc{background:var(--bg);}
.uc-posts .pc:hover{background:var(--s1);}

/* ── LOADING / EMPTY ── */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 20px;gap:16px;
}
.spin{
  width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:2px;}
.empty{
  padding:80px 20px;text-align:center;
  font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:2px;
  text-transform:uppercase;
}

/* ── LIGHTBOX ── */
#lb{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);z-index:999;
  align-items:center;justify-content:center;
  cursor:zoom-out;
}
#lb.open{display:flex;}
#lb img{
  max-width:90vw;max-height:90vh;border-radius:6px;
  border:1px solid var(--border);cursor:default;
}
#lb-close{
  position:absolute;top:16px;right:20px;background:none;border:none;
  color:var(--t2);font-size:24px;cursor:pointer;line-height:1;
  transition:color .15s;
}
#lb-close:hover{color:var(--text);}

/* ── CONFIRM MODAL ── */
#cm{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:998;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#cm.open{display:flex;}
.cm-box{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:12px;padding:24px;max-width:360px;width:90%;
}
.cm-title{font-size:15px;font-weight:500;margin-bottom:8px;}
.cm-body{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:20px;}
.cm-act{display:flex;gap:8px;justify-content:flex-end;}
.cm-no{
  background:none;border:1px solid var(--border2);color:var(--t2);
  font-family:var(--font);font-size:12px;padding:8px 16px;
  border-radius:6px;cursor:pointer;transition:all .15s;
}
.cm-no:hover{color:var(--text);border-color:var(--border2);}
.cm-yes{
  background:var(--red);border:none;color:#fff;
  font-family:var(--font);font-size:12px;font-weight:500;
  padding:8px 16px;border-radius:6px;cursor:pointer;transition:background .15s;
}
.cm-yes:hover{background:var(--red2);}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--s3);border:1px solid var(--border2);
  color:var(--text);font-size:12px;font-family:var(--mono);
  padding:10px 16px;border-radius:8px;z-index:1000;
  opacity:0;transform:translateY(8px);
  transition:opacity .2s,transform .2s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="ls">
  <div class="ls-logo">🔥 quemados</div>
  <div class="ls-title">Admin</div>
  <div class="ls-sub">Panel de control</div>
  <div class="ls-form">
    <input class="ls-input" id="ki" type="password" placeholder="••••••••••••">
    <button class="ls-btn" id="lb2">Entrar</button>
    <div class="ls-err" id="le">Clave incorrecta o error de conexión</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <span class="tb-logo">🔥 QUEMADOS</span>
    <div class="tb-sep"></div>
    <span class="tb-label">Admin Panel</span>
    <div class="tb-spacer"></div>
    <div class="tb-status">
      <div class="tb-dot"></div>
      <span>online</span>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-out" id="logout">Salir</button>
  </div>

  <div class="statsbar">
    <div class="stat">
      <div class="stat-n loading" id="sp">—</div>
      <div class="stat-l">Posts</div>
      <div class="stat-accent"></div>
    </div>
    <div class="stat">
      <div class="stat-n loading" id="sl">—</div>
      <div class="stat-l">Likes</div>
      <div class="stat-accent"></div>
    </div>
    <div class="stat">
      <div class="stat-n loading" id="sc">—</div>
      <div class="stat-l">Comentarios</div>
      <div class="stat-accent"></div>
    </div>
    <div class="stat">
      <div class="stat-n loading" id="su">—</div>
      <div class="stat-l">Usuarios ID</div>
      <div class="stat-accent"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="categories">Por categoría</button>
    <button class="tab" data-tab="users">Por usuario</button>
    <button class="tab" data-tab="all">Todos los posts</button>
  </div>

  <div class="body">
    <div class="sb" id="sb"></div>
    <div class="main" id="main">
      <div class="toolbar">
        <input class="search" id="sq" type="text" placeholder="Buscar posts...">
        <span class="rc" id="rc"></span>
        <button class="reload" id="rl">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          Reload
        </button>
      </div>
      <div id="pl"></div>
    </div>
  </div>
</div>

<div id="lb"><button id="lb-close">✕</button><img id="lbi" src="" alt=""></div>

<div id="cm">
  <div class="cm-box">
    <div class="cm-title">Eliminar post</div>
    <div class="cm-body" id="cm-body">¿Estás seguro? Esta acción no se puede deshacer.</div>
    <div class="cm-act">
      <button class="cm-no" id="cm-no">Cancelar</button>
      <button class="cm-yes" id="cm-yes">Eliminar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API='https://server-upload-production.up.railway.app';
let KEY='',posts=[],stats=null,tab='categories',cat='__all__',q='',deleteId=null;

// ── ANIM COUNTER ──
function animCount(el,target){
  const start=performance.now(),from=0,dur=600;
  el.classList.remove('loading');
  (function step(now){
    const p=Math.min((now-start)/dur,1);
    const ease=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    el.textContent=Math.round(from+(target-from)*ease).toLocaleString();
    if(p<1)requestAnimationFrame(step);
    else el.textContent=target.toLocaleString();
  })(start);
}

// ── LOGIN ──
document.getElementById('lb2').onclick=tryLogin;
document.getElementById('ki').addEventListener('keydown',e=>e.key==='Enter'&&tryLogin());
async function tryLogin(){
  const k=document.getElementById('ki').value.trim();
  if(!k)return;
  try{
    const r=await fetch(`${API}/admin/stats`,{headers:{'x-admin-key':k}});
    if(!r.ok)throw 0;
    KEY=k;
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='flex';
    loadAll();
  }catch{document.getElementById('le').style.display='block';}
}
document.getElementById('logout').onclick=()=>{
  KEY='';posts=[];
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('ki').value='';
};

// ── TABS ──
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  tab=t.dataset.tab;cat='__all__';q='';
  document.getElementById('sq').value='';
  renderSB();renderContent();
});

// ── SEARCH / RELOAD ──
document.getElementById('sq').addEventListener('input',e=>{q=e.target.value.toLowerCase();renderContent();});
document.getElementById('rl').onclick=loadAll;

// ── LOAD ──
async function loadAll(){
  document.getElementById('pl').innerHTML='<div class="loading-wrap"><div class="spin"></div><div class="loading-text">Cargando datos...</div></div>';
  try{
    const[sr,pr]=await Promise.all([
      fetch(`${API}/admin/stats`,{headers:{'x-admin-key':KEY}}),
      fetch(`${API}/admin/posts?limit=500`,{headers:{'x-admin-key':KEY}})
    ]);
    stats=await sr.json();
    const pd=await pr.json();
    posts=pd.posts||[];
    renderStats();renderSB();renderContent();
  }catch{document.getElementById('pl').innerHTML='<div class="empty">Error cargando datos</div>';}
}

function renderStats(){
  animCount(document.getElementById('sp'),stats.total_posts);
  animCount(document.getElementById('sl'),stats.total_likes);
  animCount(document.getElementById('sc'),stats.total_comments);
  const u=new Set(posts.map(p=>fingerprint(p))).size;
  animCount(document.getElementById('su'),u);
}

// ── SIDEBAR ──
function renderSB(){
  const sb=document.getElementById('sb');sb.innerHTML='';
  if(tab==='categories'){
    const m={};posts.forEach(p=>{const c=p.category||'Sin categoría';m[c]=(m[c]||0)+1;});
    const cats=Object.entries(m).sort((a,b)=>b[1]-a[1]);
    sb.innerHTML='<div class="sb-head">Categorías</div>';
    [['__all__','Todas',posts.length],...cats.map(([c,n])=>[c,c,n])].forEach(([val,lbl,cnt])=>{
      const el=document.createElement('div');
      el.className='sb-item'+(cat===val?' on':'');
      el.innerHTML=`<span class="sb-name">${esc(lbl)}</span><span class="sb-count">${cnt}</span>`;
      el.onclick=()=>{cat=val;renderSB();renderContent();};
      sb.appendChild(el);
    });
  }else if(tab==='users'){
    const um=buildUserMap();
    const users=Object.entries(um).sort((a,b)=>b[1].posts.length-a[1].posts.length);
    sb.innerHTML=`<div class="sb-head">Usuarios (${users.length})</div>`;
    [['__all__','Todos',users.length],...users.map(([fp,d])=>[fp,d.label,d.posts.length])].forEach(([val,lbl,cnt])=>{
      const el=document.createElement('div');
      el.className='sb-item'+(cat===val?' on':'');
      el.innerHTML=`<span class="sb-name">${esc(lbl)}</span><span class="sb-count">${cnt}</span>`;
      el.onclick=()=>{cat=val;renderSB();renderContent();};
      sb.appendChild(el);
    });
  }else{
    sb.innerHTML=`<div class="sb-head">Vista</div><div class="sb-item on"><span class="sb-name">Todos los posts</span><span class="sb-count">${posts.length}</span></div>`;
  }
}

// ── FINGERPRINT ──
function fingerprint(p){
  if(!p.device_info)return'unk_'+(p.author||'anon');
  const d=p.device_info;
  return btoa(unescape(encodeURIComponent((d.screen||'')+'|'+(d.platform||d.os||'')+'|'+(d.ua||'').slice(0,60)+'|'+(d.lang||'')))).slice(0,24);
}
function buildUserMap(){
  const m={};
  posts.forEach(p=>{
    const fp=fingerprint(p);
    if(!m[fp])m[fp]={posts:[],label:labelFor(p),device:p.device_info||null};
    m[fp].posts.push(p);
  });
  return m;
}
function labelFor(p){
  if(!p.device_info)return p.author||'Anónimo';
  const d=p.device_info;
  return d.mobile?`Móvil · ${d.os||d.platform||''}`:`PC · ${d.os||d.platform||''}`;
}

// ── CONTENT ──
function renderContent(){
  if(tab==='users')renderUsers();else renderPosts();
}

function filteredPosts(){
  let p=posts;
  if(tab==='categories'&&cat!=='__all__')p=p.filter(x=>(x.category||'Sin categoría')===cat);
  if(q)p=p.filter(x=>(x.target||'').toLowerCase().includes(q)||(x.content||'').toLowerCase().includes(q)||(x.author||'').toLowerCase().includes(q)||(x.category||'').toLowerCase().includes(q));
  return p;
}

function renderPosts(){
  const fp=filteredPosts();
  document.getElementById('rc').textContent=`${fp.length} post${fp.length!==1?'s':''}`;
  const c=document.getElementById('pl');
  if(!fp.length){c.innerHTML='<div class="empty">Sin resultados</div>';return;}
  c.innerHTML=fp.map(p=>pcHTML(p)).join('');
  bindPostEvents(c);
}

function renderUsers(){
  const um=buildUserMap();
  let users=Object.entries(um).sort((a,b)=>b[1].posts.length-a[1].posts.length);
  if(cat!=='__all__')users=users.filter(([fp])=>fp===cat);
  if(q)users=users.filter(([,d])=>d.posts.some(p=>(p.target||'').toLowerCase().includes(q)||(p.content||'').toLowerCase().includes(q)));
  document.getElementById('rc').textContent=`${users.length} usuario${users.length!==1?'s':''}`;
  const c=document.getElementById('pl');
  if(!users.length){c.innerHTML='<div class="empty">Sin usuarios</div>';return;}
  c.innerHTML=users.map(([fp,d])=>ucHTML(fp,d)).join('');
  c.querySelectorAll('.uc-hdr').forEach(h=>{
    h.onclick=()=>{
      const list=h.nextElementSibling,chev=h.querySelector('.uc-chev');
      list.classList.toggle('open');chev.classList.toggle('open');
    };
  });
  bindPostEvents(c);
}

function bindPostEvents(c){
  c.querySelectorAll('.pc-del').forEach(b=>b.onclick=e=>{e.stopPropagation();doConfirmDelete(+b.dataset.id);});
  c.querySelectorAll('.pc-imgs img').forEach(img=>img.onclick=e=>{e.stopPropagation();openLb(img.src);});
}

// ── HTML BUILDERS ──
function devTags(d){
  if(!d)return`<span class="dt nodata">sin datos de dispositivo</span>`;
  const tags=[];
  if(d.mobile!==undefined){
    const cls=d.mobile?'mobile':'desktop';
    tags.push(`<span class="dt ${cls}"><span class="dk">Tipo</span>${d.mobile?'📱 Móvil':'🖥 PC'}</span>`);
  }
  if(d.os)tags.push(`<span class="dt"><span class="dk">OS</span>${esc(d.os)}</span>`);
  if(d.browser)tags.push(`<span class="dt"><span class="dk">Browser</span>${esc(d.browser)}</span>`);
  if(d.screen)tags.push(`<span class="dt"><span class="dk">Pantalla</span>${esc(d.screen)}</span>`);
  if(d.viewport)tags.push(`<span class="dt"><span class="dk">Viewport</span>${esc(d.viewport)}</span>`);
  if(d.lang)tags.push(`<span class="dt"><span class="dk">Idioma</span>${esc(d.lang)}</span>`);
  if(d.tz)tags.push(`<span class="dt"><span class="dk">TZ</span>${esc(d.tz)}</span>`);
  if(d.cores)tags.push(`<span class="dt"><span class="dk">CPU</span>${esc(String(d.cores))} núcleos</span>`);
  if(d.ram)tags.push(`<span class="dt"><span class="dk">RAM</span>~${esc(String(d.ram))} GB</span>`);
  if(d.dpr)tags.push(`<span class="dt"><span class="dk">DPR</span>${esc(String(d.dpr))}x</span>`);
  return tags.join('');
}

function pcHTML(p){
  const cat=p.category||'Sin categoría';
  const date=new Date(p.created_at).toLocaleString('es-DO',{dateStyle:'short',timeStyle:'short'});
  const imgs=p.image_urls?.length?`<div class="pc-imgs">${p.image_urls.map(u=>`<img src="${esc(u)}" loading="lazy">`).join('')}</div>`:'';
  return`<div class="pc">
  <div class="pc-top">
    <span class="pc-id">#${p.id}</span>
    <span class="pc-cat">${esc(cat)}</span>
    <span class="pc-author">${esc(p.author||'Anónimo')}</span>
    <span class="pc-likes">♥ <span>${p.likes}</span></span>
    <span class="pc-date">${date}</span>
    <button class="pc-del" data-id="${p.id}">Eliminar</button>
  </div>
  <div class="pc-target">${esc(p.target)}</div>
  <div class="pc-body">${esc(p.content)}</div>
  ${imgs}
  <div class="ds">${devTags(p.device_info)}</div>
</div>`;
}

function ucHTML(fp,data){
  const d=data.device,ps=data.posts;
  const ico=d?.mobile?'📱':d?'🖥':'👤';
  const likes=ps.reduce((s,p)=>s+(p.likes||0),0);
  const last=new Date(ps[0].created_at).toLocaleDateString('es-DO');
  return`<div class="uc">
  <div class="uc-hdr">
    <div class="uc-ico">${ico}</div>
    <div class="uc-info">
      <div class="uc-id">ID: ${fp}</div>
      <div class="uc-summary">${esc(data.label)} · ${likes} likes · último: ${last}</div>
      <div class="uc-dtags">${devTags(d)}</div>
    </div>
    <div class="uc-right">
      <div class="uc-count">${ps.length}</div>
      <div class="uc-clabel">posts</div>
    </div>
    <div class="uc-chev">▶</div>
  </div>
  <div class="uc-posts">${ps.map(p=>pcHTML(p)).join('')}</div>
</div>`;
}

// ── LIGHTBOX ──
function openLb(src){document.getElementById('lbi').src=src;document.getElementById('lb').classList.add('open');}
document.getElementById('lb-close').onclick=()=>document.getElementById('lb').classList.remove('open');
document.getElementById('lb').onclick=e=>{if(e.target===document.getElementById('lb'))document.getElementById('lb').classList.remove('open');};

// ── DELETE ──
function doConfirmDelete(id){
  deleteId=id;
  document.getElementById('cm-body').textContent=`¿Eliminar post #${id}? Esta acción no se puede deshacer.`;
  document.getElementById('cm').classList.add('open');
}
document.getElementById('cm-no').onclick=()=>{document.getElementById('cm').classList.remove('open');deleteId=null;};
document.getElementById('cm-yes').onclick=async()=>{
  if(!deleteId)return;
  document.getElementById('cm').classList.remove('open');
  try{
    const r=await fetch(`${API}/admin/posts/${deleteId}`,{method:'DELETE',headers:{'x-admin-key':KEY}});
    if(!r.ok)throw 0;
    posts=posts.filter(p=>p.id!==deleteId);
    deleteId=null;
    renderStats();renderSB();renderContent();
    showToast('Post eliminado');
  }catch{showToast('Error al eliminar');}
};

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── ESC ──
function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
